<!doctype html>
<html lang="zh-CN">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Project GIGDIS alpha0.4.2</title>
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" integrity="sha256-p4NxAoJBhIIN+hmNHrzRCf9tD/miZyoHS5obTRR9BMY=" crossorigin="" />
    <style>
      :root { --bg:#0b1220; --text:#e2e8f0; --header-bg:#111b30; --header-border:#22314f; --card-bg:#111827; --card-border:#273449; --tag-bg:#1e293b; --tag-border:#334155; --meta-text:#93c5fd; --kpi-bg:#0f172a; --link-color:#7dd3fc; }
      body[data-theme='light'] { --bg:#f1f5f9; --text:#0f172a; --header-bg:#e2e8f0; --header-border:#cbd5e1; --card-bg:#fff; --card-border:#d1d5db; --tag-bg:#f1f5f9; --tag-border:#cbd5e1; --meta-text:#334155; --kpi-bg:#f8fafc; --link-color:#0369a1; }
      * { box-sizing: border-box; }
      body { margin:0; font-family:"Segoe UI", Arial, sans-serif; background:var(--bg); color:var(--text); height:100vh; overflow:hidden; }
      header { padding:14px 20px; background:var(--header-bg); border-bottom:1px solid var(--header-border); display:flex; justify-content:space-between; align-items:center; flex-wrap:wrap; gap:8px; }
      .brand { font-size:18px; font-weight:700; display:flex; align-items:center; gap:10px; }
      .logo { width:30px; height:30px; border-radius:8px; display:grid; place-items:center; font-size:16px; background:radial-gradient(circle at 30% 30%, #22d3ee 0%, #2563eb 45%, #1e1b4b 100%); box-shadow:0 0 16px rgba(34,211,238,0.3); }
      .meta { color:var(--meta-text); font-size:12px; }
      .layout { display:grid; grid-template-columns:minmax(320px,2fr) minmax(320px,1fr); gap:12px; padding:12px; height:calc(100vh - 64px); }
      .map-column { min-height:0; display:grid; grid-template-rows:minmax(320px,1fr) auto; gap:10px; }
      #map { height:100%; border-radius:10px; overflow:hidden; border:1px solid var(--header-border); position:sticky; top:0; }
      .sidebar { display:flex; flex-direction:column; gap:10px; overflow-y:auto; padding-right:4px; }
      .card { background:var(--card-bg); border:1px solid var(--card-border); border-radius:10px; padding:12px; }
      .card h3 { margin:0 0 8px; font-size:16px; }
      .filters { display:flex; flex-wrap:wrap; gap:8px; margin:10px 0; }
      .filter-button { background:var(--tag-bg); border:1px solid var(--tag-border); color:var(--text); border-radius:999px; padding:5px 11px; font-size:12px; transition:transform .16s ease, filter .16s ease, box-shadow .2s ease, border-color .2s ease, background .2s ease; }
      .filter-button.active { border-color:#22d3ee; background:linear-gradient(120deg, rgba(14,165,233,0.35), rgba(99,102,241,0.35)); box-shadow:0 0 0 1px rgba(34,211,238,0.3), 0 0 14px rgba(56,189,248,0.45); }
      .actions { display:flex; gap:8px; align-items:center; }
      button, select { border-radius:6px; padding:6px 10px; }
      button { background:#0284c7; border:none; color:#fff; cursor:pointer; transition:transform .16s ease, filter .16s ease, box-shadow .2s ease, background .2s ease; }
      button.secondary { background:#334155; }
      button:hover, .filter-button:hover { transform:translateY(-1px); filter:brightness(1.06); }
      button:active, .filter-button:active { transform:translateY(0); filter:brightness(.95); }
      button:focus-visible, .filter-button:focus-visible, select:focus-visible { outline:none; box-shadow:0 0 0 2px rgba(56,189,248,.45); }
      select { background:var(--tag-bg); border:1px solid var(--tag-border); color:var(--text); transition:border-color .2s ease, box-shadow .2s ease, background .2s ease; }
      ul { margin:0; padding-left:18px; }
      li { margin-bottom:8px; line-height:1.35; }
      li a { color:var(--link-color); margin-left:6px; }
      .kpis { display:grid; grid-template-columns:repeat(4, minmax(0,1fr)); gap:8px; }
      .kpi { background:var(--kpi-bg); border:1px solid var(--card-border); border-radius:8px; padding:8px; display:flex; flex-direction:column; gap:6px; }
      .kpi .label { font-size:11px; color:var(--meta-text); }
      .kpi .value { font-weight:700; font-size:38px; line-height:1; }
      .kpi-toggle { width:100%; background:transparent; border:1px solid var(--card-border); color:var(--meta-text); font-size:11px; padding:4px; }
      .kpi-details { display:none; border-top:1px dashed var(--card-border); padding-top:6px; }
      .kpi.expanded .kpi-details { display:block; }
      .kpi-details h4 { margin:0 0 4px; font-size:11px; color:var(--meta-text); }
      .kpi-details ul { margin:0 0 6px; font-size:11px; padding-left:16px; }
      .kpi-details canvas { width:100%; height:58px; border-radius:6px; background:rgba(30,41,59,0.25); }
      .tiles-panel { padding:0; overflow:hidden; }
      .tiles-header { display:flex; align-items:center; justify-content:space-between; padding:10px; border-bottom:1px solid var(--card-border); }
      .tiles-content { padding:10px; display:flex; flex-direction:column; gap:8px; }
      .tiles-panel.collapsed .tiles-content { display:none; }
      .tile-selector { border:1px solid var(--card-border); border-radius:8px; overflow:hidden; }
      .tile-selector-header { width:100%; display:flex; justify-content:space-between; align-items:center; background:var(--tag-bg); color:var(--text); border:none; padding:8px 10px; }
      .tile-selector-list { max-height:150px; overflow-y:auto; padding:8px; display:none; }
      .tile-selector.expanded .tile-selector-list { display:block; }
      .tile-selector-item { display:flex; align-items:center; gap:8px; font-size:12px; margin-bottom:6px; }
      .tiles-grid { display:grid; grid-template-columns:repeat(4,minmax(0,1fr)); gap:8px; grid-auto-rows:minmax(62px,auto); max-height:180px; overflow-y:auto; }
      .info-tile { background:var(--kpi-bg); border:1px solid var(--card-border); border-radius:8px; padding:8px; min-height:62px; }
      .info-tile .label { font-size:11px; color:var(--meta-text); }
      .info-tile .value { margin-top:4px; font-weight:700; font-size:15px; }
      .info-tile .sub { margin-top:4px; font-size:11px; color:var(--meta-text); }
      .trend-up { color:#22c55e; } .trend-down { color:#f97316; } .trend-flat { color:#38bdf8; }
      @media (max-width: 1100px) { body{overflow:auto;} .layout{grid-template-columns:1fr;height:auto;} .map-column{grid-template-rows:auto auto;} #map{position:relative;height:50vh;} .sidebar{overflow:visible;} .kpis{grid-template-columns:repeat(2,minmax(0,1fr));} .tiles-grid{grid-template-columns:repeat(2,minmax(0,1fr));} }
    </style>
  </head>
  <body data-theme="dark">
    <header>
      <div class="brand"><span class="logo">🌐</span>Project GIGDIS · alpha0.4.2</div>
      <div class="actions"><select id="lang-select"></select><button id="manual-refresh" type="button"></button><label for="refresh-limit" class="meta" id="refresh-limit-label"></label><select id="refresh-limit"></select><label for="refresh-interval" class="meta" id="refresh-interval-label"></label><select id="refresh-interval"></select><label for="conflict-toggle" class="meta" id="conflict-toggle-label"></label><input id="conflict-toggle" type="checkbox" checked /><button id="toggle-theme" class="secondary"></button><span id="refresh" class="meta"></span></div>
    </header>
    <main class="layout">
      <div class="map-column">
        <div id="map"></div>
        <section id="tiles-panel" class="card tiles-panel">
          <div class="tiles-header"><h3 id="tiles-title"></h3><button id="tiles-toggle" class="secondary" type="button"></button></div>
          <div class="tiles-content">

              <button id="tile-selector-toggle" class="tile-selector-header" type="button"><span id="tile-selector-title"></span><span id="tile-selector-state">▼</span></button>
              <div id="tiles-settings" class="tile-selector-list"></div>

      </div>
      <aside class="sidebar">
        <section class="card"><h3 id="filters-title"></h3><div id="topic-filters" class="filters"></div><div class="actions"><button id="clear-filters" class="secondary"></button></div><p id="active-topics" class="meta" style="margin-bottom:0"></p></section>

          <div class="kpis">
            <div class="kpi" id="kpi-card-countries"><div class="label" id="label-countries"></div><div id="kpi-countries" class="value">0</div><button class="kpi-toggle secondary" data-kpi="countries" type="button"></button><div class="kpi-details"><h4 id="countries-list-title"></h4><ul id="countries-detail-list"></ul><h4 id="countries-trend-title"></h4><canvas id="countries-chart" width="260" height="58"></canvas></div></div>
            <div class="kpi" id="kpi-card-events"><div class="label" id="label-events"></div><div id="kpi-events" class="value">0</div><button class="kpi-toggle secondary" data-kpi="events" type="button"></button><div class="kpi-details"><h4 id="events-list-title"></h4><ul id="events-detail-list"></ul><h4 id="events-trend-title"></h4><canvas id="events-chart" width="260" height="58"></canvas></div></div>
            <div class="kpi" id="kpi-card-hotness"><div class="label" id="label-hotness"></div><div id="kpi-hotness" class="value">0</div><button class="kpi-toggle secondary" data-kpi="hotness" type="button"></button><div class="kpi-details"><h4 id="hotness-list-title"></h4><ul id="hotness-detail-list"></ul><h4 id="hotness-trend-title"></h4><canvas id="hotness-chart" width="260" height="58"></canvas></div></div>
            <div class="kpi" id="kpi-card-tension"><div class="label" id="label-tension"></div><div id="kpi-tension" class="value">0</div><button class="kpi-toggle secondary" data-kpi="tension" type="button"></button><div class="kpi-details"><h4 id="tension-hotspots-title"></h4><ul id="tension-hotspots"></ul><h4 id="tension-trend-title"></h4><canvas id="tension-chart" width="260" height="58"></canvas></div></div>

        <section class="card"><h3 id="global-title"></h3><ul id="global-list"></ul></section>
        <section class="card"><h3 id="viewport-title"></h3><p class="meta" id="viewport-tip"></p><ul id="viewport-list"></ul></section>
      </aside>
    </main>

    <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js" integrity="sha256-20nQCchB9co0qIjJZRGuk2/Z9VM+kNiyxNV1lvTlZBo=" crossorigin=""></script>
    <script>
      const I18N = {
        zh: { lang:'中文', switchLight:'切换为浅色地图', switchDark:'切换为深色地图', loading:'加载中...', filters:'筛选器', clear:'清空', all:'全部', current:'当前', overview:'数据概览', countries:'国家数量', events:'新闻总数', hotness:'平均热度', tension:'全球紧张度', hotspots:'主要热点区域', trend:'每小时变化', globalTop:'全局 Top 8 热点', viewport:'当前区域热点', viewportTip:'点击地图国家圆点后自动更新（最多8条）', noData:'暂无数据', viewSource:'查看原文', lastRefresh:'上次刷新', points:'分', eventCount:'事件数', mainType:'主类型', tiles:'磁贴中心', collapse:'折叠', expand:'展开', tileSelector:'展开磁贴列表选择', hideSelector:'收起磁贴列表', tileDatetime:'时间日期', tileHeatTrend:'新闻平均热度变化', tileTensionTrend:'紧张度变化', tileActiveTopics:'当前主题', perHour:'每小时', comparedToPrev:'较上次刷新', detailExpand:'展开详情', detailCollapse:'折叠详情', topCountries:'主要国家列表', refreshNow:'手动刷新', refreshCount:'每次刷新新闻数', refreshEvery:'自动刷新', minutes:'分钟', items:'条', refreshFailed:'刷新失败', conflictZones:'冲突地区', conflictIntensity:'冲突强度', showConflictZones:'显示冲突地区' },
        en: { lang:'English', switchLight:'Switch to light map', switchDark:'Switch to dark map', loading:'Loading...', filters:'Filters', clear:'Clear', all:'All', current:'Current', overview:'Overview', countries:'Countries', events:'Total news', hotness:'Avg hotness', tension:'Global tension', hotspots:'Top hotspot regions', trend:'Hourly trend', globalTop:'Global Top 8', viewport:'Regional highlights', viewportTip:'Click a country marker to update (up to 8)', noData:'No data', viewSource:'Read source', lastRefresh:'Last refresh', points:'pts', eventCount:'Events', mainType:'Main topic', tiles:'Tile center', collapse:'Collapse', expand:'Expand', tileSelector:'Expand tile selector', hideSelector:'Hide tile selector', tileDatetime:'Date & time', tileHeatTrend:'Average heat trend', tileTensionTrend:'Tension trend', tileActiveTopics:'Active topics', perHour:'/hour', comparedToPrev:'vs previous refresh', detailExpand:'Expand details', detailCollapse:'Collapse details', topCountries:'Top countries', refreshNow:'Refresh now', refreshCount:'News per refresh', refreshEvery:'Auto refresh', minutes:'min', items:'items', refreshFailed:'Refresh failed', conflictZones:'Conflict zones', conflictIntensity:'Conflict intensity', showConflictZones:'Show conflict zones' }
      };
      const TOPIC_LABELS = { military:{zh:'军事',en:'military'}, politics:{zh:'政治',en:'politics'}, technology:{zh:'科技',en:'technology'}, science:{zh:'科学',en:'science'}, disaster:{zh:'灾害',en:'disaster'}, 'public-health':{zh:'公共卫生',en:'public-health'}, diplomacy:{zh:'外交',en:'diplomacy'}, economy:{zh:'经济',en:'economy'}, general:{zh:'综合',en:'general'} };
      const THEME_KEY='gigdis-theme', LANG_KEY='gigdis-lang', TILE_PREF_KEY='gigdis-tile-config', REFRESH_INTERVAL_KEY='gigdis-refresh-minutes', REFRESH_LIMIT_KEY='gigdis-refresh-limit', CONFLICT_TOGGLE_KEY='gigdis-show-conflict-zones';
      const REFRESH_CHOICES = [5,10,15,20,30,60];
      const REFRESH_LIMIT_CHOICES = [10,20,30,40,60,80,100];
      const BUILTIN_TILES = [
        { id:'datetime', titleKey:'tileDatetime', render:() => ({ value: `${new Date().toLocaleDateString(currentLang)} ${new Date().toLocaleTimeString(currentLang,{hour12:false})}` }) },
        { id:'heatTrend', titleKey:'tileHeatTrend', render:(ctx) => ({ value:`${ctx.heatDelta > 0 ? '+' : ''}${ctx.heatDelta.toFixed(2)} ${t().perHour}`, sub:t().comparedToPrev, valueClass:trendClass(ctx.heatDelta) }) },
        { id:'tensionTrend', titleKey:'tileTensionTrend', render:(ctx) => ({ value:`${ctx.tensionDelta > 0 ? '+' : ''}${ctx.tensionDelta} ${t().points}`, sub:t().comparedToPrev, valueClass:trendClass(ctx.tensionDelta) }) },
        { id:'activeTopics', titleKey:'tileActiveTopics', render:() => ({ value: activeTopics.length ? activeTopics.map(topicLabel).join(', ') : t().all }) }
      ];
      const map = L.map('map').setView([25,10],2);
      map.createPane('conflictPane');
      map.getPane('conflictPane').style.zIndex = 380;
      map.createPane('countryPane');
      map.getPane('countryPane').style.zIndex = 420;
      map.createPane('pluginPane');
      map.getPane('pluginPane').style.zIndex = 430;
      const tileLayers = { light:L.tileLayer('https://{s}.basemaps.cartocdn.com/light_all/{z}/{x}/{y}{r}.png', {maxZoom:7, attribution:'&copy; OpenStreetMap contributors &copy; CARTO'}), dark:L.tileLayer('https://{s}.basemaps.cartocdn.com/dark_all/{z}/{x}/{y}{r}.png', {maxZoom:7, attribution:'&copy; OpenStreetMap contributors &copy; CARTO'}) };
      const markers = L.layerGroup().addTo(map);
      const conflictMarkers = L.layerGroup().addTo(map);
      const pluginMarkers = L.layerGroup().addTo(map);
      const ALL_TOPICS = ['military','politics','technology','science','disaster','public-health','diplomacy','economy','general'];
      let currentTheme = localStorage.getItem(THEME_KEY) || 'dark';
      let currentLang = localStorage.getItem(LANG_KEY) || 'zh';
      let selectedCountry = null, activeTopics = [], lastSnapshot = { avgHotness:0, tensionScore:0, heatDelta:0, tensionDelta:0, countryDelta:0, eventDelta:0 };
      let panelCollapsed = false, selectorExpanded = false;
      let tileRegistry = [...BUILTIN_TILES], tileConfig = loadTileConfig();
      let mapMarkerPlugins = [];
      let overviewHistory = { countries:[], events:[], hotness:[] };
      let panelSnapshot = {}, hotspotsSnapshot = {};
      let refreshMinutes = Number(localStorage.getItem(REFRESH_INTERVAL_KEY) || 15);
      let refreshLimit = Number(localStorage.getItem(REFRESH_LIMIT_KEY) || 40);
      let refreshTimer = null;
      let showConflictZones = localStorage.getItem(CONFLICT_TOGGLE_KEY) !== 'false';
      const externalCache = {};

      function t(){ return I18N[currentLang] || I18N.zh; }
      function topicLabel(topic){ return (TOPIC_LABELS[topic] || {})[currentLang] || topic; }
      function trendClass(value){ if (value > 0) return 'trend-up'; if (value < 0) return 'trend-down'; return 'trend-flat'; }
      function applyTheme(theme){ currentTheme = theme === 'light' ? 'light' : 'dark'; document.body.dataset.theme = currentTheme; localStorage.setItem(THEME_KEY, currentTheme); Object.values(tileLayers).forEach(layer => map.removeLayer(layer)); tileLayers[currentTheme].addTo(map); document.getElementById('toggle-theme').textContent = currentTheme === 'dark' ? t().switchLight : t().switchDark; }
      function loadTileConfig(){ try { return JSON.parse(localStorage.getItem(TILE_PREF_KEY) || '{}'); } catch (_err) { return {}; } }
      function persistTileConfig(){ localStorage.setItem(TILE_PREF_KEY, JSON.stringify(tileConfig)); }
      function getTileTitle(tile){ return tile.title?.[currentLang] || tile.title?.zh || tile.title?.en || t()[tile.titleKey] || tile.id; }
      function formatTemplateValue(value){ if (value === null || value === undefined) return ''; if (Array.isArray(value)) return value.map(item => formatTemplateValue(item)).join(', '); if (typeof value === 'object') return JSON.stringify(value); return String(value); }
      function extractPath(obj, path){ return String(path || '').split('.').filter(Boolean).reduce((acc, key) => (acc && acc[key] !== undefined ? acc[key] : undefined), obj); }
      function compileTemplate(template, context){ return String(template || '').replace(/\{([\w.]+)\}/g, (_, key) => formatTemplateValue(extractPath(context, key))); }
      function resolveTemplateText(template, lang){ if (typeof template === 'string') return template; return (template || {})[lang] || template?.zh || template?.en || ''; }

      function normalizePluginMapMarker(plugin){
        if (!plugin || !plugin.id || plugin.type !== 'map-marker') return null;
        return {
          id: plugin.id,
          title: plugin.title || { zh: plugin.id, en: plugin.id },
          markersPath: plugin.markersPath || 'hotspots.conflict_zones',
          popupTemplate: plugin.popupTemplate || { zh:'{country}｜{event_count}条｜{intensity}分', en:'{country} | {event_count} events | {intensity} pts' },
          color: plugin.color || '#ef4444',
          radiusBase: Number(plugin.radiusBase || 6),
        };
      }
      function buildConflictPolygon(lat, lon, intensity){
        const scale = 4 + Math.max(0, Math.min(8, intensity / 12));
        const latOffset = scale;
        const lonOffset = scale * Math.max(0.6, Math.cos((lat * Math.PI) / 180));
        return [
          [lat - latOffset, lon - lonOffset],
          [lat - latOffset * 0.25, lon + lonOffset],
          [lat + latOffset, lon + lonOffset * 0.7],
          [lat + latOffset * 0.45, lon - lonOffset],
        ];
      }
      function renderConflictZones(conflictZones){
        conflictMarkers.clearLayers();
        if (!showConflictZones) return;
        (conflictZones || []).forEach(zone => {
          const intensity = Number(zone.intensity || 0);
          const polygon = L.polygon(buildConflictPolygon(zone.lat, zone.lon, intensity), { pane:'conflictPane', color:'#dc2626', fillColor:'#ef4444', fillOpacity:0.28, weight:1.5 });
          polygon.bindPopup(`<b>${t().conflictZones}｜${zone.country}</b><br/>${t().eventCount}: ${zone.event_count}<br/>${t().conflictIntensity}: ${Math.round(intensity)}${t().points}<br/>${zone.headline || ''}`);
          polygon.addTo(conflictMarkers);
        });
      }
      function renderPluginMapMarkers(context){
        pluginMarkers.clearLayers();
        mapMarkerPlugins.forEach(plugin => {
          const markerItems = extractPath(context, plugin.markersPath);
          if (!Array.isArray(markerItems)) return;
          markerItems.forEach(item => {
            if (typeof item?.lat !== 'number' || typeof item?.lon !== 'number') return;
            const itemData = { ...context, ...item };
            const radius = plugin.radiusBase + Math.max(0, Math.min(12, Number(item.intensity || 0) / 10));
            const popup = compileTemplate(resolveTemplateText(plugin.popupTemplate, currentLang), itemData);
            const marker = L.circleMarker([item.lat, item.lon], { pane:'pluginPane', radius, color:plugin.color, fillColor:plugin.color, fillOpacity:0.18, weight:2 });
            marker.bindPopup(popup || plugin.id);
            marker.addTo(pluginMarkers);
          });
        });
      }
      async function resolveExternalVars(plugin, context){
        const vars = {};
        const sources = Array.isArray(plugin.externalSources) ? plugin.externalSources : [];
        for (const source of sources) {
          if (!source?.key || !source?.url) continue;
          const cacheKey = `${plugin.id}:${source.key}`;
          const ttl = Number(source.ttlSeconds || 300) * 1000;
          const now = Date.now();
          const cached = externalCache[cacheKey];
          if (cached && (now - cached.timestamp) < ttl) { vars[source.key] = cached.value; continue; }
          try {
            const url = compileTemplate(source.url, context);
            const response = await fetch(url);
            if (!response.ok) throw new Error('external source request failed');
            const payload = source.responseType === 'text' ? await response.text() : await response.json();
            const value = source.path ? extractPath(payload, source.path) : payload;
            externalCache[cacheKey] = { value, timestamp: now };
            vars[source.key] = value;
          } catch (_err) { vars[source.key] = ''; }
        }
        return vars;
      }
      function normalizePluginTile(plugin){
        if (!plugin || !plugin.id || !plugin.type || plugin.type === 'map-marker') return null;
        return {
          id: plugin.id,
          type: plugin.type,
          title: plugin.title || { zh: plugin.id, en: plugin.id },
          render: async (ctx) => {
            const externalVars = await resolveExternalVars(plugin, ctx);
            const data = { ...ctx, ...externalVars };
            const value = compileTemplate(resolveTemplateText(plugin.valueTemplate, currentLang) || '{tensionScore}', data);
            const sub = compileTemplate(resolveTemplateText(plugin.subTemplate, currentLang) || '', data);
            return { value, sub, valueClass: plugin.type === 'metric' ? trendClass(Number(ctx.tensionDelta || 0)) : '' };
          }
        };
      }
      async function loadPluginTiles(){
        try {
          const manifest = await fetch('/plugins/index.json').then(r => r.ok ? r.json() : { tiles: [], map_markers: [] });
          const pluginTiles = [];
          const markerPlugins = [];
          for (const file of (manifest.tiles || [])) {
            try {
              const raw = await fetch(`/plugins/${file}`).then(r => r.ok ? r.json() : null);
              const tile = normalizePluginTile(raw);
              if (tile) pluginTiles.push(tile);
            } catch (_err) {}
          }
          for (const file of (manifest.map_markers || [])) {
            try {
              const raw = await fetch(`/plugins/${file}`).then(r => r.ok ? r.json() : null);
              const markerPlugin = normalizePluginMapMarker(raw);
              if (markerPlugin) markerPlugins.push(markerPlugin);
            } catch (_err) {}
          }
          mapMarkerPlugins = markerPlugins;
          tileRegistry = [...BUILTIN_TILES, ...pluginTiles];
        } catch (_err) {
          mapMarkerPlugins = [];
          tileRegistry = [...BUILTIN_TILES];
        }
      }
      function makeTile(label, value, sub = '', valueClass = ''){ return `<article class="info-tile"><div class="label">${label}</div><div class="value ${valueClass}">${value}</div>${sub ? `<div class="sub">${sub}</div>` : ''}</article>`; }
      function renderTileSettings(){
        const root = document.getElementById('tiles-settings');
        root.innerHTML = '';
        tileRegistry.forEach(tile => {
          if (typeof tileConfig[tile.id] !== 'boolean') tileConfig[tile.id] = true;
          const line = document.createElement('label'); line.className = 'tile-selector-item';
          const input = document.createElement('input'); input.type = 'checkbox'; input.checked = !!tileConfig[tile.id];
          input.addEventListener('change', () => { tileConfig[tile.id] = input.checked; persistTileConfig(); renderTiles(lastSnapshot); });
          const text = document.createElement('span'); text.textContent = getTileTitle(tile);
          line.appendChild(input); line.appendChild(text); root.appendChild(line);
        });
      }
      async function renderTiles(snapshot){
        const root = document.getElementById('tiles-grid');
        const context = { ...snapshot, tensionScore: snapshot.tensionScore || 0, activeTopics: activeTopics.map(topicLabel).join(', ') || t().all, selectedCountry:selectedCountry || '', lang:currentLang, refreshMinutes, panel:panelSnapshot, hotspots:hotspotsSnapshot, conflictZones: hotspotsSnapshot.conflict_zones || [], nowISO:new Date().toISOString() };
        const enabledTiles = tileRegistry.filter(tile => tileConfig[tile.id]);
        const entries = await Promise.all(enabledTiles.map(async (tile) => {
          const output = await Promise.resolve(tile.render(context) || {});
          return makeTile(getTileTitle(tile), output.value || t().noData, output.sub || '', output.valueClass || '');
        }));
        root.innerHTML = entries.join('') || makeTile(t().tileActiveTopics, t().noData);
      }
      function applyRefreshInterval(minutes){
        refreshMinutes = REFRESH_CHOICES.includes(Number(minutes)) ? Number(minutes) : 15;
        localStorage.setItem(REFRESH_INTERVAL_KEY, String(refreshMinutes));
        if (refreshTimer) clearInterval(refreshTimer);
        refreshTimer = setInterval(bootstrap, refreshMinutes * 60 * 1000);
      }
      function applyRefreshLimit(limit){
        refreshLimit = REFRESH_LIMIT_CHOICES.includes(Number(limit)) ? Number(limit) : 40;
        localStorage.setItem(REFRESH_LIMIT_KEY, String(refreshLimit));
      }
      function setupRefreshControls(){
        if (!REFRESH_CHOICES.includes(refreshMinutes)) refreshMinutes = 15;
        const intervalSelect = document.getElementById('refresh-interval');
        intervalSelect.innerHTML = REFRESH_CHOICES.map(min => `<option value="${min}" ${min===refreshMinutes?'selected':''}>${min}</option>`).join('');
        intervalSelect.addEventListener('change', (e) => applyRefreshInterval(Number(e.target.value)));

        if (!REFRESH_LIMIT_CHOICES.includes(refreshLimit)) refreshLimit = 40;
        const limitSelect = document.getElementById('refresh-limit');
        limitSelect.innerHTML = REFRESH_LIMIT_CHOICES.map(count => `<option value="${count}" ${count===refreshLimit?'selected':''}>${count}</option>`).join('');
        limitSelect.addEventListener('change', async (e) => {
          applyRefreshLimit(Number(e.target.value));
          await bootstrap(true);
        });

        document.getElementById('manual-refresh').addEventListener('click', async () => {
          await bootstrap(true);
        });

        applyRefreshInterval(refreshMinutes);
        applyRefreshLimit(refreshLimit);
      }
      function syncTilePanelState(){ document.getElementById('tiles-panel').classList.toggle('collapsed', panelCollapsed); document.getElementById('tiles-toggle').textContent = panelCollapsed ? t().expand : t().collapse; }
      function syncSelectorState(){ document.getElementById('tile-selector').classList.toggle('expanded', selectorExpanded); document.getElementById('tile-selector-title').textContent = selectorExpanded ? t().hideSelector : t().tileSelector; document.getElementById('tile-selector-state').textContent = selectorExpanded ? '▲' : '▼'; }
      function drawMiniChart(canvasId, points){
        const canvas = document.getElementById(canvasId); const ctx = canvas.getContext('2d');
        ctx.clearRect(0,0,canvas.width,canvas.height); if (!points.length) return;
        const vals = points.map(p => Number(p.score || p)); const max = Math.max(...vals, 1), min = Math.min(...vals, 0), span = Math.max(max - min, 1);
        ctx.beginPath(); ctx.strokeStyle = '#22d3ee'; ctx.lineWidth = 2;
        vals.forEach((v,i)=>{ const x=(i/Math.max(vals.length-1,1))*(canvas.width-10)+5; const y=(1-(v-min)/span)*(canvas.height-12)+6; if(i===0) ctx.moveTo(x,y); else ctx.lineTo(x,y); });
        ctx.stroke();
      }
      function renderOverviewDetails(countries, tension){
        const byEvents = [...countries].sort((a,b)=>b.event_count-a.event_count).slice(0,5);
        const byHotness = [...countries].sort((a,b)=>b.avg_hotness-a.avg_hotness).slice(0,5);
        const byCountryHeat = (tension.top_regions || []).slice(0,5);
        document.getElementById('countries-detail-list').innerHTML = byEvents.map(c => `<li>${c.country}: ${c.event_count}${t().eventCount}</li>`).join('') || `<li>${t().noData}</li>`;
        document.getElementById('events-detail-list').innerHTML = byEvents.map(c => `<li>${c.country}: ${c.event_count}${t().eventCount}</li>`).join('') || `<li>${t().noData}</li>`;
        document.getElementById('hotness-detail-list').innerHTML = byHotness.map(c => `<li>${c.country}: ${c.avg_hotness}${t().points}</li>`).join('') || `<li>${t().noData}</li>`;
        document.getElementById('tension-hotspots').innerHTML = byCountryHeat.map(c => `<li>${c.region}: ${Math.round(c.heat)} ${t().points}</li>`).join('') || `<li>${t().noData}</li>`;
        drawMiniChart('countries-chart', overviewHistory.countries);
        drawMiniChart('events-chart', overviewHistory.events);
        drawMiniChart('hotness-chart', overviewHistory.hotness);
        drawMiniChart('tension-chart', tension.hourly_trend || []);
      }
      function renderKpis(countries, tension){
        const totalCountries = countries.length;
        const totalEvents = countries.reduce((acc, item) => acc + item.event_count, 0);
        const avgHotness = totalCountries ? (countries.reduce((acc, item) => acc + item.avg_hotness, 0) / totalCountries).toFixed(1) : '0';
        document.getElementById('kpi-countries').textContent = String(totalCountries);
        document.getElementById('kpi-events').textContent = String(totalEvents);
        document.getElementById('kpi-hotness').textContent = String(avgHotness);
        document.getElementById('kpi-tension').textContent = String(tension.score ?? 0);
        renderOverviewDetails(countries, tension || {});
      }
      function renderList(el, items){ el.innerHTML = ''; if (!items.length) { el.innerHTML = `<li>${t().noData}</li>`; return; } items.forEach(item => { const li = document.createElement('li'); const label = item.topic_label || topicLabel(item.topic); li.appendChild(document.createTextNode(`${item.country}｜${label}｜${item.hotness}${t().points}｜${item.title}`)); if (item.link) { const link = document.createElement('a'); link.href = item.link; link.target = '_blank'; link.rel = 'noopener noreferrer'; link.textContent = t().viewSource; li.appendChild(link); } el.appendChild(li); }); }
      function markerStyle(country, stats){ const hotnessRatio = stats.hotnessSpan > 0 ? (country.avg_hotness - stats.minHotness) / stats.hotnessSpan : 0.5; const countRatio = stats.maxEvents > 0 ? country.event_count / stats.maxEvents : 0; const radius = 6 + countRatio * 14 + hotnessRatio * 8; const hue = 210 - hotnessRatio * 190; return { radius, fillColor:`hsl(${hue}, 85%, 52%)`, borderColor:`hsl(${Math.max(0, hue - 15)}, 90%, 42%)` }; }
      function readSelectedTopics(){ return [...document.querySelectorAll('#topic-filters .filter-button.active')].map(el => el.dataset.topic); }
      function clearSelectedTopics(){ document.querySelectorAll('#topic-filters .filter-button').forEach(el => el.classList.remove('active')); }
      function topicQuery(){ return activeTopics.length ? `topics=${encodeURIComponent(activeTopics.join(','))}` : ''; }
      function initFilters(force=false){ const root = document.getElementById('topic-filters'); if (!force && root.childElementCount) return; root.innerHTML=''; ALL_TOPICS.forEach(topic => { const button = document.createElement('button'); button.type='button'; button.className='filter-button'; button.dataset.topic=topic; button.textContent=topicLabel(topic); if (activeTopics.includes(topic)) button.classList.add('active'); button.addEventListener('click', async () => { button.classList.toggle('active'); activeTopics=readSelectedTopics(); selectedCountry=null; await bootstrap(); }); root.appendChild(button); }); }
      async function loadPanel(country = null){ const params = []; if (country) params.push(`viewport_country=${encodeURIComponent(country)}`); const tq = topicQuery(); if (tq) params.push(tq); params.push(`lang=${encodeURIComponent(currentLang)}`); const panel = await fetch(`/api/v1/panel?${params.join('&')}`).then(r => r.json()); renderList(document.getElementById('global-list'), (panel.global_top || []).slice(0,8)); renderList(document.getElementById('viewport-list'), (panel.viewport_related || []).slice(0,8)); return panel; }
      async function bootstrap(forceServerRefresh = false){
        const params = [];
        const tq = topicQuery();
        if (tq) params.push(tq);
        params.push(`lang=${encodeURIComponent(currentLang)}`);

        if (forceServerRefresh) {
          const refreshResp = await fetch(`/api/v1/refresh?limit_per_source=${refreshLimit}`).then(r => r.json());
          if (!refreshResp.ok) throw new Error(t().refreshFailed);
        }

        const hotspots = await fetch(`/api/v1/hotspots?${params.join('&')}`).then(r => r.json());
        hotspotsSnapshot = hotspots || {};
        document.getElementById('refresh').textContent = `${t().lastRefresh}：${hotspots.last_refresh || 'N/A'}`;
        document.getElementById('active-topics').textContent = `${t().current}：${activeTopics.length ? activeTopics.map(topicLabel).join(', ') : t().all}`;
        const countries = hotspots.countries || []; const tension = hotspots.global_tension || {}; const conflictZones = hotspots.conflict_zones || [];
        renderConflictZones(conflictZones.filter(zone => !selectedCountry || zone.country !== selectedCountry));
        const totalCountries = countries.length; const totalEvents = countries.reduce((acc, item) => acc + item.event_count, 0);
        const avgHotnessRaw = totalCountries ? (countries.reduce((acc, item) => acc + item.avg_hotness, 0) / totalCountries) : 0;
        const tensionScore = Number(tension.score || 0);
        overviewHistory.countries = [...overviewHistory.countries, totalCountries].slice(-24);
        overviewHistory.events = [...overviewHistory.events, totalEvents].slice(-24);
        overviewHistory.hotness = [...overviewHistory.hotness, Number(avgHotnessRaw.toFixed(2))].slice(-24);
        const heatDelta = avgHotnessRaw - (lastSnapshot.avgHotness || 0);
        const tensionDelta = Math.round(tensionScore - (lastSnapshot.tensionScore || 0));
        const countryDelta = totalCountries - Number(lastSnapshot.countries || 0);
        const eventDelta = totalEvents - Number(lastSnapshot.events || 0);
        lastSnapshot = { avgHotness:avgHotnessRaw, tensionScore, heatDelta, tensionDelta, countryDelta, eventDelta, countries: totalCountries, events: totalEvents, lastRefresh:hotspots.last_refresh || '', topCountryByEvents:countries[0]?.country || '', topTopic:countries[0]?.top_topic_label || topicLabel(countries[0]?.top_topic || '') };
        renderKpis(countries, tension);
        await renderTiles(lastSnapshot);
        renderPluginMapMarkers({ ...lastSnapshot, hotspots: hotspotsSnapshot, panel: panelSnapshot, lang: currentLang, activeTopics: activeTopics.map(topicLabel).join(', ') || t().all });

        markers.clearLayers();
        const hotnessValues = countries.map(c => c.avg_hotness);
        const stats = { maxEvents:Math.max(...countries.map(c => c.event_count),1), minHotness:hotnessValues.length ? Math.min(...hotnessValues) : 0, maxHotness:hotnessValues.length ? Math.max(...hotnessValues) : 100 };
        stats.hotnessSpan = Math.max(1, stats.maxHotness - stats.minHotness);
        countries.forEach(country => { const style = markerStyle(country, stats); const marker = L.circleMarker([country.lat, country.lon], { pane:'countryPane', radius:style.radius, color:style.borderColor, fillColor:style.fillColor, fillOpacity:0.7 }); marker.bindPopup(`<b>${country.country}</b><br/>${t().eventCount}: ${country.event_count}<br/>${t().hotness}: ${country.avg_hotness}<br/>${t().mainType}: ${country.top_topic_label || topicLabel(country.top_topic)}`); marker.on('click', async () => { selectedCountry = country.country; const panel = await loadPanel(selectedCountry); panelSnapshot = panel || {}; await renderTiles(lastSnapshot); }); marker.addTo(markers); });
        const panel = await loadPanel(selectedCountry);
        panelSnapshot = panel || {};
        await renderTiles(lastSnapshot);
        renderPluginMapMarkers({ ...lastSnapshot, hotspots: hotspotsSnapshot, panel: panelSnapshot, lang: currentLang, activeTopics: activeTopics.map(topicLabel).join(', ') || t().all });
      }
      function rerenderStaticText(){
        document.getElementById('filters-title').textContent = t().filters; document.getElementById('clear-filters').textContent = t().clear;
        document.getElementById('overview-title').textContent = t().overview; document.getElementById('label-countries').textContent = t().countries;
        document.getElementById('label-events').textContent = t().events; document.getElementById('label-hotness').textContent = t().hotness; document.getElementById('label-tension').textContent = t().tension;
        document.getElementById('countries-list-title').textContent = t().topCountries; document.getElementById('events-list-title').textContent = t().topCountries; document.getElementById('hotness-list-title').textContent = t().topCountries;
        document.getElementById('countries-trend-title').textContent = t().trend; document.getElementById('events-trend-title').textContent = t().trend; document.getElementById('hotness-trend-title').textContent = t().trend;
        document.getElementById('tension-hotspots-title').textContent = t().hotspots; document.getElementById('tension-trend-title').textContent = t().trend;
        document.getElementById('global-title').textContent = t().globalTop; document.getElementById('viewport-title').textContent = t().viewport; document.getElementById('viewport-tip').textContent = t().viewportTip;
        document.getElementById('tiles-title').textContent = t().tiles; document.getElementById('refresh').textContent = t().loading;
        document.getElementById('manual-refresh').textContent = t().refreshNow;
        document.getElementById('refresh-limit-label').textContent = t().refreshCount;
        document.getElementById('refresh-interval-label').textContent = t().refreshEvery;
        document.getElementById('conflict-toggle-label').textContent = t().showConflictZones;
        document.getElementById('conflict-toggle').checked = showConflictZones;
        document.querySelectorAll('#refresh-limit option').forEach(opt => { opt.textContent = `${opt.value}${t().items}`; });
        document.querySelectorAll('#refresh-interval option').forEach(opt => { opt.textContent = `${opt.value}${t().minutes}`; });
        document.querySelectorAll('.kpi-toggle').forEach(btn => { const card = btn.closest('.kpi'); btn.textContent = card.classList.contains('expanded') ? t().detailCollapse : t().detailExpand; });
        syncSelectorState(); renderTileSettings(); syncTilePanelState(); applyTheme(currentTheme);
      }
      function setupLanguage(){ const select = document.getElementById('lang-select'); select.innerHTML=''; Object.keys(I18N).forEach(key => { const opt = document.createElement('option'); opt.value = key; opt.textContent = I18N[key].lang; opt.selected = key === currentLang; select.appendChild(opt); }); select.addEventListener('change', async (e) => { currentLang = e.target.value; localStorage.setItem(LANG_KEY, currentLang); rerenderStaticText(); initFilters(true); await bootstrap(); }); }

      document.getElementById('toggle-theme').addEventListener('click', () => applyTheme(currentTheme === 'dark' ? 'light' : 'dark'));
      document.getElementById('clear-filters').addEventListener('click', async () => { clearSelectedTopics(); activeTopics = []; selectedCountry = null; await bootstrap(); });
      document.getElementById('tiles-toggle').addEventListener('click', () => { panelCollapsed = !panelCollapsed; syncTilePanelState(); });
      document.getElementById('tile-selector-toggle').addEventListener('click', () => { selectorExpanded = !selectorExpanded; syncSelectorState(); });
      document.getElementById('conflict-toggle').addEventListener('change', (e) => { showConflictZones = !!e.target.checked; localStorage.setItem(CONFLICT_TOGGLE_KEY, showConflictZones ? 'true' : 'false'); renderConflictZones((hotspotsSnapshot.conflict_zones || []).filter(zone => !selectedCountry || zone.country !== selectedCountry)); });
      document.querySelectorAll('.kpi-toggle').forEach(btn => btn.addEventListener('click', () => { const card = btn.closest('.kpi'); card.classList.toggle('expanded'); btn.textContent = card.classList.contains('expanded') ? t().detailCollapse : t().detailExpand; }));

      (async function init(){
        setupLanguage();
        setupRefreshControls();
        await loadPluginTiles();
        rerenderStaticText();
        initFilters();
        await renderTiles(lastSnapshot);
        renderPluginMapMarkers({ ...lastSnapshot, hotspots: hotspotsSnapshot, panel: panelSnapshot, lang: currentLang, activeTopics: activeTopics.map(topicLabel).join(', ') || t().all });
        await bootstrap();
        
      })();
    </script>
  </body>
</html>

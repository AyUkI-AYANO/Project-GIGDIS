<!doctype html>
<html lang="zh-CN">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Project GIGDIS alpha0.2.2</title>
    <link
      rel="stylesheet"
      href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css"
      integrity="sha256-p4NxAoJBhIIN+hmNHrzRCf9tD/miZyoHS5obTRR9BMY="
      crossorigin=""
    />
    <style>
      :root {
        --bg: #0b1220;
        --text: #e2e8f0;
        --header-bg: #111b30;
        --header-border: #22314f;
        --card-bg: #111827;
        --card-border: #273449;
        --tag-bg: #1e293b;
        --tag-border: #334155;
        --meta-text: #93c5fd;
        --kpi-bg: #0f172a;
        --link-color: #7dd3fc;
      }
      body[data-theme='light'] {
        --bg: #f1f5f9;
        --text: #0f172a;
        --header-bg: #e2e8f0;
        --header-border: #cbd5e1;
        --card-bg: #ffffff;
        --card-border: #d1d5db;
        --tag-bg: #f1f5f9;
        --tag-border: #cbd5e1;
        --meta-text: #334155;
        --kpi-bg: #f8fafc;
        --link-color: #0369a1;
      }
      * { box-sizing: border-box; }
      body {
        margin: 0;
        font-family: "Segoe UI", Arial, sans-serif;
        background: var(--bg);
        color: var(--text);
        height: 100vh;
        overflow: hidden;
      }
      header {
        padding: 14px 20px;
        background: var(--header-bg);
        border-bottom: 1px solid var(--header-border);
        display: flex;
        justify-content: space-between;
        align-items: center;
        flex-wrap: wrap;
        gap: 8px;
      }
      .brand {
        font-size: 18px;
        font-weight: 700;
        display: flex;
        align-items: center;
        gap: 10px;
      }
      .logo {
        width: 30px;
        height: 30px;
        border-radius: 8px;
        display: grid;
        place-items: center;
        font-size: 16px;
        background: radial-gradient(circle at 30% 30%, #22d3ee 0%, #2563eb 45%, #1e1b4b 100%);
        box-shadow: 0 0 16px rgba(34, 211, 238, 0.3);
      }
      .meta { color: var(--meta-text); font-size: 12px; }
      .layout {
        display: grid;
        grid-template-columns: minmax(320px, 2fr) minmax(320px, 1fr);
        gap: 12px;
        padding: 12px;
        height: calc(100vh - 64px);
      }
      #map {
        height: 100%;
        border-radius: 10px;
        overflow: hidden;
        border: 1px solid var(--header-border);
        position: sticky;
        top: 0;
      }
      .sidebar {
        display: flex;
        flex-direction: column;
        gap: 10px;
        overflow-y: auto;
        padding-right: 4px;
      }
      .card {
        background: var(--card-bg);
        border: 1px solid var(--card-border);
        border-radius: 10px;
        padding: 12px;
      }
      .card h3 { margin: 0 0 8px; font-size: 16px; }
      .filters {
        display: flex;
        flex-wrap: wrap;
        gap: 8px;
        margin: 10px 0;
      }
      .filter-button {
        background: var(--tag-bg);
        border: 1px solid var(--tag-border);
        color: var(--text);
        border-radius: 999px;
        padding: 5px 11px;
        font-size: 12px;
        transition: transform 120ms ease, box-shadow 160ms ease, border-color 160ms ease, background 160ms ease;
      }
      .filter-button:hover {
        transform: translateY(-1px);
      }
      .filter-button.active {
        border-color: #22d3ee;
        background: linear-gradient(120deg, rgba(14, 165, 233, 0.35), rgba(99, 102, 241, 0.35));
        box-shadow: 0 0 0 1px rgba(34, 211, 238, 0.3), 0 0 14px rgba(56, 189, 248, 0.45);
      }
      .actions {
        display: flex;
        gap: 8px;
        align-items: center;
      }
      button {
        background: #0284c7;
        border: none;
        color: #fff;
        border-radius: 6px;
        padding: 6px 12px;
        cursor: pointer;
      }
      button.secondary {
        background: #334155;
      }
      ul { margin: 0; padding-left: 18px; }
      li { margin-bottom: 8px; line-height: 1.35; }
      li a { color: var(--link-color); margin-left: 6px; }
      .kpis {
        display: grid;
        grid-template-columns: repeat(3, minmax(0, 1fr));
        gap: 8px;
      }
      .kpi {
        background: var(--kpi-bg);
        border: 1px solid var(--card-border);
        border-radius: 8px;
        padding: 8px;
      }
      .kpi .label { font-size: 11px; color: var(--meta-text); }
      .kpi .value { font-weight: 700; margin-top: 4px; }
      @media (max-width: 1100px) {
        body { overflow: auto; }
        .layout { grid-template-columns: 1fr; }
        #map { height: 50vh; }
        .sidebar { overflow: visible; }
      }
    </style>
  </head>
  <body data-theme="dark">
    <header>
      <div class="brand"><span class="logo">🌐</span>Project GIGDIS · alpha0.2.2</div>
      <div class="actions">
        <button id="toggle-theme" class="secondary">切换为浅色地图</button>
        <span id="refresh" class="meta">加载中...</span>
      </div>
    </header>

    <main class="layout">
      <div id="map"></div>
      <aside class="sidebar">
        <section class="card">
          <h3>筛选器</h3>
          <div id="topic-filters" class="filters"></div>
          <div class="actions">
            <button id="clear-filters" class="secondary">清空</button>
          </div>
          <p id="active-topics" class="meta" style="margin-bottom:0">当前：全部</p>
        </section>

        <section class="card">
          <h3>数据概览</h3>
          <div class="kpis">
            <div class="kpi"><div class="label">国家数量</div><div id="kpi-countries" class="value">0</div></div>
            <div class="kpi"><div class="label">新闻总数</div><div id="kpi-events" class="value">0</div></div>
            <div class="kpi"><div class="label">平均热度</div><div id="kpi-hotness" class="value">0</div></div>
          </div>
        </section>

        <section class="card">
          <h3>全局 Top 8 热点</h3>
          <ul id="global-list"></ul>
        </section>

        <section class="card">
          <h3>当前区域热点</h3>
          <p class="meta">点击地图国家圆点后自动更新（最多8条）</p>
          <ul id="viewport-list"></ul>
        </section>
      </aside>
    </main>

    <script
      src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"
      integrity="sha256-20nQCchB9co0qIjJZRGuk2/Z9VM+kNiyxNV1lvTlZBo="
      crossorigin=""
    ></script>
    <script>
      const THEME_KEY = 'gigdis-theme';
      const map = L.map('map').setView([25, 10], 2);
      const tileLayers = {
        light: L.tileLayer('https://{s}.basemaps.cartocdn.com/light_all/{z}/{x}/{y}{r}.png', {
          maxZoom: 7,
          attribution: '&copy; OpenStreetMap contributors &copy; CARTO'
        }),
        dark: L.tileLayer('https://{s}.basemaps.cartocdn.com/dark_all/{z}/{x}/{y}{r}.png', {
          maxZoom: 7,
          attribution: '&copy; OpenStreetMap contributors &copy; CARTO'
        })
      };
      let currentTheme = localStorage.getItem(THEME_KEY) || 'dark';
      let activeTileLayer = null;

      const markers = L.layerGroup().addTo(map);
      let selectedCountry = null;
      let activeTopics = [];

      const ALL_TOPICS = ['military', 'politics', 'technology', 'science', 'disaster', 'public-health', 'diplomacy', 'economy', 'general'];

      function applyTheme(theme) {
        currentTheme = theme === 'light' ? 'light' : 'dark';
        document.body.dataset.theme = currentTheme;
        localStorage.setItem(THEME_KEY, currentTheme);

        if (activeTileLayer) {
          map.removeLayer(activeTileLayer);
        }
        activeTileLayer = tileLayers[currentTheme];
        activeTileLayer.addTo(map);

        const button = document.getElementById('toggle-theme');
        button.textContent = currentTheme === 'dark' ? '切换为浅色地图' : '切换为深色地图';
      }

      function initFilters() {
        const root = document.getElementById('topic-filters');
        ALL_TOPICS.forEach(topic => {
          const button = document.createElement('button');
          button.type = 'button';
          button.className = 'filter-button';
          button.dataset.topic = topic;
          button.textContent = topic;
          button.addEventListener('click', async () => {
            button.classList.toggle('active');
            activeTopics = readSelectedTopics();
            selectedCountry = null;
            await bootstrap();
          });
          root.appendChild(button);
        });
      }

      function readSelectedTopics() {
        return [...document.querySelectorAll('#topic-filters .filter-button.active')].map(el => el.dataset.topic);
      }

      function clearSelectedTopics() {
        document.querySelectorAll('#topic-filters .filter-button').forEach(el => {
          el.classList.remove('active');
        });
      }

      function topicQuery() {
        if (!activeTopics.length) {
          return '';
        }
        return `topics=${encodeURIComponent(activeTopics.join(','))}`;
      }

      function renderList(el, items) {
        el.innerHTML = '';
        if (!items.length) {
          el.innerHTML = '<li>暂无数据</li>';
          return;
        }
        items.forEach(item => {
          const li = document.createElement('li');
          const text = document.createTextNode(`${item.country}｜${item.topic}｜${item.hotness}分｜${item.title}`);
          li.appendChild(text);
          if (item.link) {
            const link = document.createElement('a');
            link.href = item.link;
            link.target = '_blank';
            link.rel = 'noopener noreferrer';
            link.textContent = '查看原文';
            li.appendChild(link);
          }
          el.appendChild(li);
        });
      }

      function renderKpis(countries) {
        const totalCountries = countries.length;
        const totalEvents = countries.reduce((acc, item) => acc + item.event_count, 0);
        const avgHotness = totalCountries
          ? (countries.reduce((acc, item) => acc + item.avg_hotness, 0) / totalCountries).toFixed(1)
          : '0';
        document.getElementById('kpi-countries').textContent = String(totalCountries);
        document.getElementById('kpi-events').textContent = String(totalEvents);
        document.getElementById('kpi-hotness').textContent = String(avgHotness);
      }

      function markerStyle(country, stats) {
        const hotnessRatio = stats.hotnessSpan > 0
          ? (country.avg_hotness - stats.minHotness) / stats.hotnessSpan
          : 0.5;
        const countRatio = stats.maxEvents > 0 ? country.event_count / stats.maxEvents : 0;
        const radius = 6 + countRatio * 14 + hotnessRatio * 8;
        const hue = 210 - hotnessRatio * 190;
        const fillColor = `hsl(${hue}, 85%, 52%)`;
        const borderColor = `hsl(${Math.max(0, hue - 15)}, 90%, 42%)`;
        return { radius, fillColor, borderColor };
      }

      async function loadPanel(country = null) {
        const params = [];
        if (country) {
          params.push(`viewport_country=${encodeURIComponent(country)}`);
        }
        const tq = topicQuery();
        if (tq) {
          params.push(tq);
        }
        const query = params.length ? `?${params.join('&')}` : '';
        const panel = await fetch(`/api/v1/panel${query}`).then(r => r.json());
        renderList(document.getElementById('global-list'), (panel.global_top || []).slice(0, 8));
        renderList(document.getElementById('viewport-list'), (panel.viewport_related || []).slice(0, 8));
      }

      async function bootstrap() {
        const query = topicQuery();
        const hotspots = await fetch(`/api/v1/hotspots${query ? `?${query}` : ''}`).then(r => r.json());
        document.getElementById('refresh').textContent = `上次刷新：${hotspots.last_refresh || 'N/A'}`;
        document.getElementById('active-topics').textContent = `当前：${activeTopics.length ? activeTopics.join(', ') : '全部'}`;
        renderKpis(hotspots.countries || []);

        markers.clearLayers();
        const countries = hotspots.countries || [];
        const hotnessValues = countries.map(c => c.avg_hotness);
        const stats = {
          maxEvents: Math.max(...countries.map(c => c.event_count), 1),
          minHotness: hotnessValues.length ? Math.min(...hotnessValues) : 0,
          maxHotness: hotnessValues.length ? Math.max(...hotnessValues) : 100,
        };
        stats.hotnessSpan = Math.max(1, stats.maxHotness - stats.minHotness);

        countries.forEach(country => {
          const style = markerStyle(country, stats);
          const marker = L.circleMarker([country.lat, country.lon], {
            radius: style.radius,
            color: style.borderColor,
            fillColor: style.fillColor,
            fillOpacity: 0.7
          });
          marker.bindPopup(`<b>${country.country}</b><br/>事件数: ${country.event_count}<br/>热度: ${country.avg_hotness}<br/>主类型: ${country.top_topic}`);
          marker.on('click', () => {
            selectedCountry = country.country;
            loadPanel(selectedCountry);
          });
          marker.addTo(markers);
        });

        await loadPanel(selectedCountry);
      }

      document.getElementById('toggle-theme').addEventListener('click', () => {
        applyTheme(currentTheme === 'dark' ? 'light' : 'dark');
      });

      document.getElementById('clear-filters').addEventListener('click', async () => {
        clearSelectedTopics();
        activeTopics = [];
        selectedCountry = null;
        await bootstrap();
      });

      initFilters();
      applyTheme(currentTheme);
      bootstrap();
      setInterval(bootstrap, 15 * 60 * 1000);
    </script>
  </body>
</html>

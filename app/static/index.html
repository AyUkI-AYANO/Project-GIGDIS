    <style>

      * { box-sizing: border-box; }
      body { margin:0; font-family:"Segoe UI", Arial, sans-serif; background:var(--bg); color:var(--text); height:100vh; overflow:hidden; }

      .map-column { min-height:0; display:grid; grid-template-rows:minmax(320px,1fr) auto; gap:10px; }

      .actions { display:flex; gap:8px; align-items:center; }

      .settings-group.open .settings-menu { display:flex; }
      .settings-item { display:flex; align-items:center; justify-content:space-between; gap:10px; }
      .settings-item .meta { font-size:12px; }
      .settings-item select { min-width:120px; }
      button, select { border-radius:6px; padding:6px 10px; }
      button { background:var(--button-bg); border:none; color:#fff; cursor:pointer; transition:transform .16s ease, filter .16s ease, box-shadow .2s ease, background .2s ease; }
      button.secondary { background:#334155; }
      button:hover, .filter-button:hover { transform:translateY(-1px); filter:brightness(1.06); }
      button:active, .filter-button:active { transform:translateY(0); filter:brightness(.95); }
      button:focus-visible, .filter-button:focus-visible, select:focus-visible { outline:none; box-shadow:0 0 0 2px rgba(56,189,248,.45); }
      select { background:var(--tag-bg); border:1px solid var(--tag-border); color:var(--text); transition:border-color .2s ease, box-shadow .2s ease, background .2s ease; }
      ul { margin:0; padding-left:18px; }
      li { margin-bottom:8px; line-height:1.35; }
      li a { color:var(--link-color); margin-left:6px; }
      .kpis { display:grid; grid-template-columns:repeat(5, minmax(0,1fr)); gap:8px; }
      .kpi { background:var(--kpi-bg); border:1px solid var(--card-border); border-radius:8px; padding:8px; display:flex; flex-direction:column; gap:6px; min-width:0; }
      .kpi .label { font-size:11px; color:var(--meta-text); }
      .kpi .value { font-weight:700; font-size:30px; line-height:1; white-space:nowrap; overflow:hidden; text-overflow:clip; max-width:100%; min-height:30px; display:flex; align-items:flex-end; }
      .kpi-toggle { width:100%; background:transparent; border:1px solid var(--card-border); color:var(--meta-text); font-size:11px; padding:4px; margin-top:auto; }
      .kpi-details { display:none; border-top:1px dashed var(--card-border); padding-top:6px; }
      .kpi.expanded .kpi-details { display:block; }
      .kpi-details h4 { margin:0 0 4px; font-size:11px; color:var(--meta-text); }
      .kpi-details ul { margin:0 0 6px; font-size:11px; padding-left:16px; }

      .tile-selector-item { display:flex; align-items:center; gap:8px; font-size:12px; margin-bottom:6px; }
      .tiles-grid { display:grid; grid-template-columns:repeat(4,minmax(0,1fr)); gap:8px; grid-auto-rows:minmax(62px,auto); max-height:180px; overflow-y:auto; }
      .info-tile { background:var(--kpi-bg); border:1px solid var(--card-border); border-radius:8px; padding:8px; min-height:62px; }
      .info-tile .label { font-size:11px; color:var(--meta-text); }

      .trend-up { color:#22c55e; } .trend-down { color:#f97316; } .trend-flat { color:#38bdf8; }

      const THEME_KEY='gigdis-theme', LANG_KEY='gigdis-lang', TILE_PREF_KEY='gigdis-tile-config', REFRESH_INTERVAL_KEY='gigdis-refresh-minutes', REFRESH_LIMIT_KEY='gigdis-refresh-limit', MARKET_TOGGLE_KEY='gigdis-show-markets', THEME_PLUGIN_KEY='gigdis-theme-plugin', CUSTOM_BACKGROUND_KEY='gigdis-custom-background';

      const ALL_TOPICS = ['military','politics','technology','science','disaster','public-health','diplomacy','economy','general'];
      let currentTheme = localStorage.getItem(THEME_KEY) || 'dark';

      let selectedCountry = null, activeTopics = [], lastSnapshot = { avgHotness:0, tensionScore:0, heatDelta:0, tensionDelta:0, countryDelta:0, eventDelta:0 };

      function getTileTitle(tile){ return tile.title?.[currentLang] || tile.title?.zh || tile.title?.en || t()[tile.titleKey] || tile.id; }
      function formatTemplateValue(value){ if (value === null || value === undefined) return ''; if (Array.isArray(value)) return value.map(item => formatTemplateValue(item)).join(', '); if (typeof value === 'object') return JSON.stringify(value); return String(value); }
      function extractPath(obj, path){ return String(path || '').split('.').filter(Boolean).reduce((acc, key) => (acc && acc[key] !== undefined ? acc[key] : undefined), obj); }
      function toNumeric(value){
        if (typeof value === 'number') return Number.isFinite(value) ? value : 0;

        return Number.isFinite(parsed) ? parsed : 0;

      const TEMPLATE_FUNCTIONS = {
        upper: (...args) => formatTemplateValue(args[0]).toUpperCase(),
        lower: (...args) => formatTemplateValue(args[0]).toLowerCase(),
        fixed: (...args) => toNumeric(args[0]).toFixed(Math.max(0, Math.min(6, Math.round(toNumeric(args[1] ?? 2))))),
        percent: (...args) => `${toNumeric(args[0]).toFixed(Math.max(0, Math.min(4, Math.round(toNumeric(args[1] ?? 2)))))}%`,
        add: (...args) => String(args.reduce((sum, item) => sum + toNumeric(item), 0)),
        multiply: (...args) => String(args.reduce((sum, item) => sum * toNumeric(item), 1)),
        join: (...args) => {
          if (!args.length) return '';

      function parseTemplateToken(token, context){
        const raw = String(token || '').trim();
        if (!raw) return '';

      const GLOBAL_MARKETS = [

      function computeGlobalEconomyMetrics(){
        const weightedMarkets = GLOBAL_MARKETS.map(item => {
          const coefficient = Number(item.marketCapTrillion || 1) * Number(item.influence || 1);
          return { ...item, coefficient, delta: parseIndexDelta(item.indexDelta) };
        });
        const totalWeight = weightedMarkets.reduce((sum, item) => sum + item.coefficient, 0) || 1;
        const weightedDelta = weightedMarkets.reduce((sum, item) => sum + item.delta * item.coefficient, 0) / totalWeight;
        const indexScore = Number((1000 * (1 + weightedDelta / 100)).toFixed(2));
        const ranking = weightedMarkets
          .map(item => ({ ...item, weightedImpact: Number((item.delta * item.coefficient).toFixed(3)), weightRatio: item.coefficient / totalWeight }))
          .sort((a,b) => b.weightedImpact - a.weightedImpact)

        return { indexScore, weightedDelta, ranking };

          const cacheKey = `${plugin.id}:${source.key}`;
          const ttl = Number(source.ttlSeconds || 300) * 1000;

        renderPluginMapMarkers({ ...lastSnapshot, hotspots: hotspotsSnapshot, panel: panelSnapshot, lang: currentLang, activeTopics: activeTopics.map(topicLabel).join(', ') || t().all, markets: GLOBAL_MARKETS });
        renderMarketLayers();

        markers.clearLayers();
        const hotnessValues = countries.map(c => c.avg_hotness);
        const stats = { maxEvents:Math.max(...countries.map(c => c.event_count),1), minHotness:hotnessValues.length ? Math.min(...hotnessValues) : 0, maxHotness:hotnessValues.length ? Math.max(...hotnessValues) : 100 };
        stats.hotnessSpan = Math.max(1, stats.maxHotness - stats.minHotness);
        countries.forEach(country => { const style = markerStyle(country, stats); const marker = L.circleMarker([country.lat, country.lon], { pane:'countryPane', radius:style.radius, color:style.borderColor, fillColor:style.fillColor, fillOpacity:0.7 }); marker.bindPopup(`<b>${country.country}</b><br/>${t().eventCount}: ${country.event_count}<br/>${t().hotness}: ${country.avg_hotness}<br/>${t().mainType}: ${country.top_topic_label || topicLabel(country.top_topic)}`); marker.on('click', async () => { selectedCountry = country.country; const panel = await loadPanel(selectedCountry); panelSnapshot = panel || {}; await renderTiles(lastSnapshot); }); marker.addTo(markers); });
        const panel = await loadPanel(selectedCountry);
        panelSnapshot = panel || {};
        await renderTiles(lastSnapshot);
        renderPluginMapMarkers({ ...lastSnapshot, hotspots: hotspotsSnapshot, panel: panelSnapshot, lang: currentLang, activeTopics: activeTopics.map(topicLabel).join(', ') || t().all, markets: GLOBAL_MARKETS });
        renderMarketLayers();
      }
      function rerenderStaticText(){
        document.getElementById('filters-title').textContent = t().filters; document.getElementById('clear-filters').textContent = t().clear;
        document.getElementById('overview-title').textContent = t().overview; document.getElementById('label-countries').textContent = t().countries;
        document.getElementById('label-events').textContent = t().events; document.getElementById('label-hotness').textContent = t().hotness; document.getElementById('label-tension').textContent = t().tension; document.getElementById('label-global-economy').textContent = t().globalEconomy;
        document.getElementById('countries-list-title').textContent = t().topCountries; document.getElementById('events-list-title').textContent = t().topCountries; document.getElementById('hotness-list-title').textContent = t().topCountries;
        document.getElementById('countries-trend-title').textContent = t().trend; document.getElementById('events-trend-title').textContent = t().trend; document.getElementById('hotness-trend-title').textContent = t().trend;
        document.getElementById('tension-hotspots-title').textContent = t().hotspots; document.getElementById('tension-trend-title').textContent = t().trend; document.getElementById('global-economy-list-title').textContent = t().exchangeRanking; document.getElementById('global-economy-trend-title').textContent = t().trend;
        document.getElementById('global-title').textContent = t().globalTop; document.getElementById('viewport-title').textContent = t().viewport; document.getElementById('viewport-tip').textContent = t().viewportTip;
        document.getElementById('tiles-title').textContent = t().tiles; document.getElementById('refresh').textContent = t().loading;
        document.getElementById('manual-refresh').textContent = t().refreshNow;
        document.getElementById('settings-toggle').textContent = t().settings;
        document.getElementById('refresh-limit-label').textContent = t().refreshCount;
        document.getElementById('refresh-interval-label').textContent = t().refreshEvery;
        document.getElementById('market-toggle-label').textContent = t().showMarkets;
        document.getElementById('market-toggle').checked = showMarkets;
        document.getElementById('theme-plugin-label').textContent = t().themePlugin;
        document.getElementById('upload-background').textContent = t().uploadBackground;
        document.getElementById('reset-background').textContent = t().resetBackground;
        renderThemePluginSelect();
        document.querySelectorAll('#refresh-limit option').forEach(opt => { opt.textContent = `${opt.value}${t().items}`; });
        document.querySelectorAll('#refresh-interval option').forEach(opt => { opt.textContent = `${opt.value}${t().minutes}`; });
        document.querySelectorAll('.kpi-toggle').forEach(btn => { const card = btn.closest('.kpi'); btn.textContent = card.classList.contains('expanded') ? t().detailCollapse : t().detailExpand; });
        syncSelectorState(); renderTileSettings(); syncTilePanelState(); applyTheme(currentTheme);
      }
      function setupLanguage(){ const select = document.getElementById('lang-select'); select.innerHTML=''; Object.keys(I18N).forEach(key => { const opt = document.createElement('option'); opt.value = key; opt.textContent = I18N[key].lang; opt.selected = key === currentLang; select.appendChild(opt); }); select.addEventListener('change', async (e) => { currentLang = e.target.value; localStorage.setItem(LANG_KEY, currentLang); rerenderStaticText(); initFilters(true); await bootstrap(); }); }
      function setupSettingsMenu(){
        const group = document.getElementById('settings-group');
        const button = document.getElementById('settings-toggle');
        button.addEventListener('click', () => group.classList.toggle('open'));
        document.addEventListener('click', (event) => {
          if (!group.contains(event.target)) group.classList.remove('open');
        });
      }

      document.getElementById('toggle-theme').addEventListener('click', () => applyTheme(currentTheme === 'dark' ? 'light' : 'dark'));
      document.getElementById('clear-filters').addEventListener('click', async () => { clearSelectedTopics(); activeTopics = []; selectedCountry = null; await bootstrap(); });
      document.getElementById('tiles-toggle').addEventListener('click', () => { panelCollapsed = !panelCollapsed; syncTilePanelState(); });
      document.getElementById('tile-selector-toggle').addEventListener('click', () => { selectorExpanded = !selectorExpanded; syncSelectorState(); });
      document.getElementById('market-toggle').addEventListener('change', (e) => { showMarkets = !!e.target.checked; localStorage.setItem(MARKET_TOGGLE_KEY, showMarkets ? 'true' : 'false'); renderMarketLayers(); });
      document.getElementById('theme-plugin-select').addEventListener('change', (e) => { applyThemePlugin(e.target.value); });
      document.getElementById('upload-background').addEventListener('click', () => { document.getElementById('background-file-input').click(); });
      document.getElementById('reset-background').addEventListener('click', () => { setCustomBackgroundImage(''); });
      document.getElementById('background-file-input').addEventListener('change', (e) => {
        const file = e.target.files?.[0];
        if (!file) return;
        const reader = new FileReader();
        reader.onload = () => { setCustomBackgroundImage(String(reader.result || '')); e.target.value = ''; };
        reader.onerror = () => { alert(t().backgroundReadError); e.target.value = ''; };
        reader.readAsDataURL(file);
      });
      document.querySelectorAll('.kpi-toggle').forEach(btn => btn.addEventListener('click', () => { const card = btn.closest('.kpi'); card.classList.toggle('expanded'); btn.textContent = card.classList.contains('expanded') ? t().detailCollapse : t().detailExpand; }));

      window.addEventListener('resize', fitAllKpiValues);

      (async function init(){
        setupSettingsMenu();
        setupLanguage();
        setupRefreshControls();
        await loadPluginTiles();
        rerenderStaticText();
        applyThemePlugin(activeThemePlugin);
        initFilters();
        await renderTiles(lastSnapshot);
        renderPluginMapMarkers({ ...lastSnapshot, hotspots: hotspotsSnapshot, panel: panelSnapshot, lang: currentLang, activeTopics: activeTopics.map(topicLabel).join(', ') || t().all, markets: GLOBAL_MARKETS });
        renderMarketLayers();
        await bootstrap();
        
      })();
    </script>
  </body>
</html>

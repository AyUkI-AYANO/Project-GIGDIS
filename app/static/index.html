<!doctype html>
<html lang="zh-CN">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Project GIGDIS alpha0.2.5</title>
    <link
      rel="stylesheet"
      href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css"
      integrity="sha256-p4NxAoJBhIIN+hmNHrzRCf9tD/miZyoHS5obTRR9BMY="
      crossorigin=""
    />
    <style>
      :root { --bg: #0b1220; --text: #e2e8f0; --header-bg: #111b30; --header-border: #22314f; --card-bg: #111827; --card-border: #273449; --tag-bg: #1e293b; --tag-border: #334155; --meta-text: #93c5fd; --kpi-bg: #0f172a; --link-color: #7dd3fc; }
      body[data-theme='light'] { --bg: #f1f5f9; --text: #0f172a; --header-bg: #e2e8f0; --header-border: #cbd5e1; --card-bg: #fff; --card-border: #d1d5db; --tag-bg: #f1f5f9; --tag-border: #cbd5e1; --meta-text: #334155; --kpi-bg: #f8fafc; --link-color: #0369a1; }
      * { box-sizing: border-box; }
      body { margin: 0; font-family: "Segoe UI", Arial, sans-serif; background: var(--bg); color: var(--text); height: 100vh; overflow: hidden; }
      header { padding: 14px 20px; background: var(--header-bg); border-bottom: 1px solid var(--header-border); display: flex; justify-content: space-between; align-items: center; flex-wrap: wrap; gap: 8px; }
      .brand { font-size: 18px; font-weight: 700; display: flex; align-items: center; gap: 10px; }
      .logo { width: 30px; height: 30px; border-radius: 8px; display: grid; place-items: center; font-size: 16px; background: radial-gradient(circle at 30% 30%, #22d3ee 0%, #2563eb 45%, #1e1b4b 100%); box-shadow: 0 0 16px rgba(34, 211, 238, 0.3); }
      .meta { color: var(--meta-text); font-size: 12px; }
      .layout { display: grid; grid-template-columns: minmax(320px, 2fr) minmax(320px, 1fr); gap: 12px; padding: 12px; height: calc(100vh - 64px); }
      .map-column { min-height: 0; display: grid; grid-template-rows: minmax(320px, 1fr) auto; gap: 10px; }
      #map { height: 100%; border-radius: 10px; overflow: hidden; border: 1px solid var(--header-border); position: sticky; top: 0; }
      .sidebar { display: flex; flex-direction: column; gap: 10px; overflow-y: auto; padding-right: 4px; }
      .card { background: var(--card-bg); border: 1px solid var(--card-border); border-radius: 10px; padding: 12px; }
      .card h3 { margin: 0 0 8px; font-size: 16px; }
      .filters { display: flex; flex-wrap: wrap; gap: 8px; margin: 10px 0; }
      .filter-button { background: var(--tag-bg); border: 1px solid var(--tag-border); color: var(--text); border-radius: 999px; padding: 5px 11px; font-size: 12px; }
      .filter-button.active { border-color: #22d3ee; background: linear-gradient(120deg, rgba(14, 165, 233, 0.35), rgba(99, 102, 241, 0.35)); box-shadow: 0 0 0 1px rgba(34, 211, 238, 0.3), 0 0 14px rgba(56, 189, 248, 0.45); }
      .actions { display: flex; gap: 8px; align-items: center; }
      button, select { border-radius: 6px; padding: 6px 10px; }
      button { background: #0284c7; border: none; color: #fff; cursor: pointer; }
      button.secondary { background: #334155; }
      select { background: var(--tag-bg); border: 1px solid var(--tag-border); color: var(--text); }
      ul { margin: 0; padding-left: 18px; }
      li { margin-bottom: 8px; line-height: 1.35; }
      li a { color: var(--link-color); margin-left: 6px; }
      .kpis { display: grid; grid-template-columns: repeat(4, minmax(0, 1fr)); gap: 8px; }
      .kpi { background: var(--kpi-bg); border: 1px solid var(--card-border); border-radius: 8px; padding: 8px; position: relative; }
      .kpi .label { font-size: 11px; color: var(--meta-text); }
      .kpi .value { font-weight: 700; margin-top: 4px; }
      .tension-kpi { display: flex; flex-direction: column; gap: 6px; }
      .tension-inline { border-top: 1px dashed var(--card-border); padding-top: 6px; }
      .tension-inline h4 { margin: 0 0 4px; font-size: 11px; color: var(--meta-text); font-weight: 600; }
      .tension-inline ul { margin: 0 0 6px; font-size: 11px; padding-left: 16px; }
      .tension-inline canvas { width: 100%; height: 68px; }
      .tiles-panel { padding: 0; overflow: hidden; }
      .tiles-header { display: flex; align-items: center; justify-content: space-between; padding: 10px; border-bottom: 1px solid var(--card-border); }
      .tiles-header h3 { margin: 0; }
      .tile-toggle { min-width: 84px; }
      .tiles-content { padding: 10px; display: flex; flex-direction: column; gap: 8px; }
      .tiles-panel.collapsed .tiles-content { display: none; }
      .tiles-settings { display: flex; flex-wrap: wrap; gap: 8px; font-size: 11px; color: var(--meta-text); }
      .tiles-settings label { display: inline-flex; align-items: center; gap: 6px; cursor: pointer; }
      .tiles-grid { display: grid; grid-template-columns: repeat(4, minmax(0, 1fr)); gap: 8px; grid-auto-rows: minmax(62px, auto); max-height: 132px; overflow-y: auto; padding-right: 2px; }
      .info-tile { background: var(--kpi-bg); border: 1px solid var(--card-border); border-radius: 8px; padding: 8px; min-height: 62px; }
      .info-tile .label { font-size: 11px; color: var(--meta-text); }
      .info-tile .value { margin-top: 4px; font-weight: 700; font-size: 15px; }
      .info-tile .sub { margin-top: 4px; font-size: 11px; color: var(--meta-text); }
      .trend-up { color: #22c55e; }
      .trend-down { color: #f97316; }
      .trend-flat { color: #38bdf8; }
      @media (max-width: 1100px) { body { overflow: auto; } .layout { grid-template-columns: 1fr; height: auto; } .map-column { grid-template-rows: auto auto; } #map { position: relative; height: 50vh; } .sidebar { overflow: visible; } .kpis { grid-template-columns: repeat(2, minmax(0, 1fr)); } .tiles-grid { grid-template-columns: repeat(2, minmax(0, 1fr)); max-height: 132px; } }
    </style>
  </head>
  <body data-theme="dark">

      <div class="actions">

    <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js" integrity="sha256-20nQCchB9co0qIjJZRGuk2/Z9VM+kNiyxNV1lvTlZBo=" crossorigin=""></script>
    <script>
      const I18N = {
        zh: { lang: '中文', switchLight: '切换为浅色地图', switchDark: '切换为深色地图', loading: '加载中...', filters: '筛选器', clear: '清空', all: '全部', current: '当前', overview: '数据概览', countries: '国家数量', events: '新闻总数', hotness: '平均热度', tension: '全球紧张度', hotspots: '主要热点区域', trend: '每小时紧张度变化', globalTop: '全局 Top 8 热点', viewport: '当前区域热点', viewportTip: '点击地图国家圆点后自动更新（最多8条）', noData: '暂无数据', viewSource: '查看原文', lastRefresh: '上次刷新', points: '分', eventCount: '事件数', mainType: '主类型', tiles: '自定义磁贴', collapse: '折叠', expand: '展开', tileDatetime: '时间日期', tileHeatTrend: '新闻平均热度变化', tileTensionTrend: '紧张度变化', tileActiveTopics: '当前主题', perHour: '每小时', comparedToPrev: '较上次刷新' },
        en: { lang: 'English', switchLight: 'Switch to light map', switchDark: 'Switch to dark map', loading: 'Loading...', filters: 'Filters', clear: 'Clear', all: 'All', current: 'Current', overview: 'Overview', countries: 'Countries', events: 'Total news', hotness: 'Avg hotness', tension: 'Global tension', hotspots: 'Top hotspot regions', trend: 'Hourly tension trend', globalTop: 'Global Top 8', viewport: 'Regional highlights', viewportTip: 'Click a country marker to update (up to 8)', noData: 'No data', viewSource: 'Read source', lastRefresh: 'Last refresh', points: 'pts', eventCount: 'Events', mainType: 'Main topic', tiles: 'Custom tiles', collapse: 'Collapse', expand: 'Expand', tileDatetime: 'Date & time', tileHeatTrend: 'Average heat trend', tileTensionTrend: 'Tension trend', tileActiveTopics: 'Active topics', perHour: '/hour', comparedToPrev: 'vs previous refresh' },
        ru: { lang: 'Русский', switchLight: 'Светлая карта', switchDark: 'Тёмная карта', loading: 'Загрузка...', filters: 'Фильтры', clear: 'Очистить', all: 'Все', current: 'Текущие', overview: 'Сводка', countries: 'Страны', events: 'Новости', hotness: 'Средняя горячесть', tension: 'Глобальная напряжённость', hotspots: 'Главные регионы', trend: 'Почасовой тренд', globalTop: 'Глобальный Top 8', viewport: 'Региональные события', viewportTip: 'Нажмите маркер страны (до 8)', noData: 'Нет данных', viewSource: 'Источник', lastRefresh: 'Обновлено', points: 'балл', eventCount: 'События', mainType: 'Главная тема', tiles: 'Настраиваемые плитки', collapse: 'Свернуть', expand: 'Развернуть', tileDatetime: 'Дата и время', tileHeatTrend: 'Динамика средней горячести', tileTensionTrend: 'Динамика напряжённости', tileActiveTopics: 'Активные темы', perHour: '/час', comparedToPrev: 'к прошлому обновлению' },
        fr: { lang: 'Français', switchLight: 'Carte claire', switchDark: 'Carte sombre', loading: 'Chargement...', filters: 'Filtres', clear: 'Effacer', all: 'Tout', current: 'Actifs', overview: 'Aperçu', countries: 'Pays', events: 'Actualités', hotness: 'Chaleur moy.', tension: 'Tension mondiale', hotspots: 'Régions clés', trend: 'Évolution horaire', globalTop: 'Top 8 mondial', viewport: 'Foyer régional', viewportTip: 'Cliquez un marqueur de pays (max 8)', noData: 'Aucune donnée', viewSource: 'Source', lastRefresh: 'Dernière MAJ', points: 'pts', eventCount: 'Événements', mainType: 'Sujet principal', tiles: 'Tuiles personnalisées', collapse: 'Réduire', expand: 'Développer', tileDatetime: 'Date et heure', tileHeatTrend: 'Variation de chaleur moyenne', tileTensionTrend: 'Variation de tension', tileActiveTopics: 'Sujets actifs', perHour: '/heure', comparedToPrev: 'vs actualisation précédente' },
        de: { lang: 'Deutsch', switchLight: 'Helle Karte', switchDark: 'Dunkle Karte', loading: 'Lädt...', filters: 'Filter', clear: 'Leeren', all: 'Alle', current: 'Aktiv', overview: 'Übersicht', countries: 'Länder', events: 'Nachrichten', hotness: 'Ø Hotness', tension: 'Globale Spannung', hotspots: 'Top-Regionen', trend: 'Stündlicher Verlauf', globalTop: 'Globale Top 8', viewport: 'Regionale Hotspots', viewportTip: 'Landesmarker anklicken (max. 8)', noData: 'Keine Daten', viewSource: 'Quelle', lastRefresh: 'Aktualisiert', points: 'Pkt', eventCount: 'Ereignisse', mainType: 'Top-Thema', tiles: 'Anpassbare Kacheln', collapse: 'Einklappen', expand: 'Ausklappen', tileDatetime: 'Datum & Uhrzeit', tileHeatTrend: 'Ø-Hotness-Verlauf', tileTensionTrend: 'Spannungs-Verlauf', tileActiveTopics: 'Aktive Themen', perHour: '/Std.', comparedToPrev: 'vs. vorherigem Refresh' }
      };
      const TOPIC_LABELS = {
        military: { zh: '军事', en: 'military', ru: 'Военные', fr: 'Militaire', de: 'Militär' },
        politics: { zh: '政治', en: 'politics', ru: 'Политика', fr: 'Politique', de: 'Politik' },
        technology: { zh: '科技', en: 'technology', ru: 'Технологии', fr: 'Technologie', de: 'Technologie' },
        science: { zh: '科学', en: 'science', ru: 'Наука', fr: 'Science', de: 'Wissenschaft' },
        disaster: { zh: '灾害', en: 'disaster', ru: 'Бедствия', fr: 'Catastrophe', de: 'Katastrophe' },
        'public-health': { zh: '公共卫生', en: 'public-health', ru: 'Общественное здоровье', fr: 'Santé publique', de: 'Öffentliche Gesundheit' },
        diplomacy: { zh: '外交', en: 'diplomacy', ru: 'Дипломатия', fr: 'Diplomatie', de: 'Diplomatie' },
        economy: { zh: '经济', en: 'economy', ru: 'Экономика', fr: 'Économie', de: 'Wirtschaft' },
        general: { zh: '综合', en: 'general', ru: 'Общее', fr: 'Général', de: 'Allgemein' }
      };

      const THEME_KEY = 'gigdis-theme';
      const LANG_KEY = 'gigdis-lang';
      const map = L.map('map').setView([25, 10], 2);
      const tileLayers = {
        light: L.tileLayer('https://{s}.basemaps.cartocdn.com/light_all/{z}/{x}/{y}{r}.png', { maxZoom: 7, attribution: '&copy; OpenStreetMap contributors &copy; CARTO' }),
        dark: L.tileLayer('https://{s}.basemaps.cartocdn.com/dark_all/{z}/{x}/{y}{r}.png', { maxZoom: 7, attribution: '&copy; OpenStreetMap contributors &copy; CARTO' })
      };
      let currentTheme = localStorage.getItem(THEME_KEY) || 'dark';
      let activeTileLayer = null;
      const markers = L.layerGroup().addTo(map);
      let selectedCountry = null;
      let activeTopics = [];
      let currentLang = localStorage.getItem(LANG_KEY) || 'zh';
      const TILE_PREF_KEY = 'gigdis-tile-config';
      const TILE_IDS = ['datetime', 'heatTrend', 'tensionTrend', 'activeTopics'];
      let tileConfig = loadTileConfig();
      let panelCollapsed = false;
      const ALL_TOPICS = ['military', 'politics', 'technology', 'science', 'disaster', 'public-health', 'diplomacy', 'economy', 'general'];

      function t() { return I18N[currentLang] || I18N.zh; }
      function topicLabel(topic) { return (TOPIC_LABELS[topic] || {})[currentLang] || topic; }

      function applyTheme(theme) {
        currentTheme = theme === 'light' ? 'light' : 'dark';
        document.body.dataset.theme = currentTheme;
        localStorage.setItem(THEME_KEY, currentTheme);
        if (activeTileLayer) map.removeLayer(activeTileLayer);
        activeTileLayer = tileLayers[currentTheme];
        activeTileLayer.addTo(map);
        document.getElementById('toggle-theme').textContent = currentTheme === 'dark' ? t().switchLight : t().switchDark;
      }

      function setupLanguage() {
        const select = document.getElementById('lang-select');
        select.innerHTML = '';
        Object.keys(I18N).forEach(key => {
          const opt = document.createElement('option');
          opt.value = key;
          opt.textContent = I18N[key].lang;
          opt.selected = key === currentLang;
          select.appendChild(opt);
        });
        select.addEventListener('change', async (e) => {
          currentLang = e.target.value;
          localStorage.setItem(LANG_KEY, currentLang);
          rerenderStaticText();
          initFilters(true);
          await bootstrap();
        });
      }

      function rerenderStaticText() {
        document.getElementById('filters-title').textContent = t().filters;
        document.getElementById('clear-filters').textContent = t().clear;
        document.getElementById('overview-title').textContent = t().overview;
        document.getElementById('label-countries').textContent = t().countries;
        document.getElementById('label-events').textContent = t().events;
        document.getElementById('label-hotness').textContent = t().hotness;
        document.getElementById('label-tension').textContent = t().tension;
        document.getElementById('tension-hotspots-title').textContent = t().hotspots;
        document.getElementById('tension-trend-title').textContent = t().trend;
        document.getElementById('global-title').textContent = t().globalTop;
        document.getElementById('viewport-title').textContent = t().viewport;
        document.getElementById('viewport-tip').textContent = t().viewportTip;
        document.getElementById('tiles-title').textContent = t().tiles;
        document.getElementById('refresh').textContent = t().loading;
        renderTileSettings();
        syncTilePanelState();
        applyTheme(currentTheme);
      }

      function loadTileConfig() {
        const defaults = { datetime: true, heatTrend: true, tensionTrend: true, activeTopics: true };
        try {
          const saved = JSON.parse(localStorage.getItem(TILE_PREF_KEY) || '{}');
          TILE_IDS.forEach(id => {
            if (typeof saved[id] === 'boolean') defaults[id] = saved[id];
          });
        } catch (_err) {}
        return defaults;
      }

      function persistTileConfig() {
        localStorage.setItem(TILE_PREF_KEY, JSON.stringify(tileConfig));
      }

      function renderTileSettings() {
        const root = document.getElementById('tiles-settings');
        root.innerHTML = '';
        TILE_IDS.forEach(id => {
          const label = document.createElement('label');
          const input = document.createElement('input');
          input.type = 'checkbox';
          input.checked = !!tileConfig[id];
          input.addEventListener('change', () => {
            tileConfig[id] = input.checked;
            persistTileConfig();
            renderTiles(lastSnapshot);
          });
          const text = document.createElement('span');
          text.textContent = tileTitle(id);
          label.appendChild(input);
          label.appendChild(text);
          root.appendChild(label);
        });
      }

      function tileTitle(id) {
        if (id === 'datetime') return t().tileDatetime;
        if (id === 'heatTrend') return t().tileHeatTrend;
        if (id === 'tensionTrend') return t().tileTensionTrend;
        return t().tileActiveTopics;
      }

      function syncTilePanelState() {
        const panel = document.getElementById('tiles-panel');
        panel.classList.toggle('collapsed', panelCollapsed);
        document.getElementById('tiles-toggle').textContent = panelCollapsed ? t().expand : t().collapse;
      }

      function trendClass(value) {
        if (value > 0) return 'trend-up';
        if (value < 0) return 'trend-down';
        return 'trend-flat';
      }

      function makeTile(label, value, sub = '', valueClass = '') {
        return `<article class="info-tile"><div class="label">${label}</div><div class="value ${valueClass}">${value}</div>${sub ? `<div class="sub">${sub}</div>` : ''}</article>`;
      }

      function renderTiles(snapshot = null) {
        const root = document.getElementById('tiles-grid');
        const now = new Date();
        const entries = [];
        if (tileConfig.datetime) {
          const date = now.toLocaleDateString(currentLang);
          const time = now.toLocaleTimeString(currentLang, { hour12: false });
          entries.push(makeTile(t().tileDatetime, `${date} ${time}`));
        }
        if (tileConfig.heatTrend) {
          const delta = snapshot ? snapshot.heatDelta : 0;
          const sign = delta > 0 ? '+' : '';
          entries.push(makeTile(t().tileHeatTrend, `${sign}${delta.toFixed(2)} ${t().perHour}`, t().comparedToPrev, trendClass(delta)));
        }
        if (tileConfig.tensionTrend) {
          const delta = snapshot ? snapshot.tensionDelta : 0;
          const sign = delta > 0 ? '+' : '';
          entries.push(makeTile(t().tileTensionTrend, `${sign}${delta} ${t().points}`, t().comparedToPrev, trendClass(delta)));
        }
        if (tileConfig.activeTopics) {
          const text = activeTopics.length ? activeTopics.map(topicLabel).join(', ') : t().all;
          entries.push(makeTile(t().tileActiveTopics, text));
        }
        root.innerHTML = entries.join('') || makeTile(t().tileActiveTopics, t().noData);
      }

      function initFilters(force = false) {
        const root = document.getElementById('topic-filters');
        if (!force && root.childElementCount) return;
        root.innerHTML = '';
        ALL_TOPICS.forEach(topic => {
          const button = document.createElement('button');
          button.type = 'button';
          button.className = 'filter-button';
          button.dataset.topic = topic;
          button.textContent = topicLabel(topic);
          if (activeTopics.includes(topic)) button.classList.add('active');
          button.addEventListener('click', async () => {
            button.classList.toggle('active');
            activeTopics = readSelectedTopics();
            selectedCountry = null;
            await bootstrap();
          });
          root.appendChild(button);
        });
      }

      function readSelectedTopics() { return [...document.querySelectorAll('#topic-filters .filter-button.active')].map(el => el.dataset.topic); }
      function clearSelectedTopics() { document.querySelectorAll('#topic-filters .filter-button').forEach(el => el.classList.remove('active')); }
      function topicQuery() { return activeTopics.length ? `topics=${encodeURIComponent(activeTopics.join(','))}` : ''; }

      function renderList(el, items) {
        el.innerHTML = '';
        if (!items.length) { el.innerHTML = `<li>${t().noData}</li>`; return; }
        items.forEach(item => {
          const li = document.createElement('li');
          const label = item.topic_label || topicLabel(item.topic);
          li.appendChild(document.createTextNode(`${item.country}｜${label}｜${item.hotness}${t().points}｜${item.title}`));
          if (item.link) {
            const link = document.createElement('a');
            link.href = item.link; link.target = '_blank'; link.rel = 'noopener noreferrer'; link.textContent = t().viewSource;
            li.appendChild(link);
          }
          el.appendChild(li);
        });
      }

      function drawTensionChart(points) {
        const canvas = document.getElementById('tension-chart');
        const ctx = canvas.getContext('2d');
        ctx.clearRect(0, 0, canvas.width, canvas.height);
        if (!points.length) return;
        ctx.strokeStyle = '#22d3ee';
        ctx.lineWidth = 2;
        const max = 100;
        const len = points.length;
        points.forEach((p, idx) => {
          const x = (idx / Math.max(1, len - 1)) * (canvas.width - 10) + 5;
          const y = (1 - p.score / max) * (canvas.height - 16) + 8;
          if (idx === 0) ctx.moveTo(x, y); else ctx.lineTo(x, y);
        });
        ctx.stroke();
      }

      function renderTension(tension) {
        document.getElementById('kpi-tension').textContent = String(tension.score ?? 0);
        const root = document.getElementById('tension-hotspots');
        root.innerHTML = '';
        const regions = tension.top_regions || [];
        if (!regions.length) {
          root.innerHTML = `<li>${t().noData}</li>`;
        } else {
          regions.forEach(item => {
            const li = document.createElement('li');
            li.textContent = `${item.region}: ${Math.round(item.heat)} ${t().points}`;
            root.appendChild(li);
          });
        }
        drawTensionChart(tension.hourly_trend || []);
      }

      function renderKpis(countries, tension) {
        const totalCountries = countries.length;
        const totalEvents = countries.reduce((acc, item) => acc + item.event_count, 0);
        const avgHotness = totalCountries ? (countries.reduce((acc, item) => acc + item.avg_hotness, 0) / totalCountries).toFixed(1) : '0';
        document.getElementById('kpi-countries').textContent = String(totalCountries);
        document.getElementById('kpi-events').textContent = String(totalEvents);
        document.getElementById('kpi-hotness').textContent = String(avgHotness);
        renderTension(tension || {});
      }

      function markerStyle(country, stats) {
        const hotnessRatio = stats.hotnessSpan > 0 ? (country.avg_hotness - stats.minHotness) / stats.hotnessSpan : 0.5;
        const countRatio = stats.maxEvents > 0 ? country.event_count / stats.maxEvents : 0;
        const radius = 6 + countRatio * 14 + hotnessRatio * 8;
        const hue = 210 - hotnessRatio * 190;
        return { radius, fillColor: `hsl(${hue}, 85%, 52%)`, borderColor: `hsl(${Math.max(0, hue - 15)}, 90%, 42%)` };
      }

      async function loadPanel(country = null) {
        const params = [];
        if (country) params.push(`viewport_country=${encodeURIComponent(country)}`);
        const tq = topicQuery(); if (tq) params.push(tq);
        params.push(`lang=${encodeURIComponent(currentLang)}`);
        const panel = await fetch(`/api/v1/panel?${params.join('&')}`).then(r => r.json());
        renderList(document.getElementById('global-list'), (panel.global_top || []).slice(0, 8));
        renderList(document.getElementById('viewport-list'), (panel.viewport_related || []).slice(0, 8));
      }

      let lastSnapshot = { avgHotness: 0, tensionScore: 0, heatDelta: 0, tensionDelta: 0 };

      async function bootstrap() {
        const params = [];
        const tq = topicQuery(); if (tq) params.push(tq);
        params.push(`lang=${encodeURIComponent(currentLang)}`);
        const hotspots = await fetch(`/api/v1/hotspots?${params.join('&')}`).then(r => r.json());
        document.getElementById('refresh').textContent = `${t().lastRefresh}：${hotspots.last_refresh || 'N/A'}`;
        document.getElementById('active-topics').textContent = `${t().current}：${activeTopics.length ? activeTopics.map(topicLabel).join(', ') : t().all}`;
        const countries = hotspots.countries || [];
        const tension = hotspots.global_tension || {};
        const totalCountries = countries.length;
        const avgHotness = totalCountries ? (countries.reduce((acc, item) => acc + item.avg_hotness, 0) / totalCountries) : 0;
        const tensionScore = Number(tension.score || 0);
        const heatDelta = avgHotness - (lastSnapshot.avgHotness || 0);
        const tensionDelta = Math.round(tensionScore - (lastSnapshot.tensionScore || 0));
        lastSnapshot = { avgHotness, tensionScore, heatDelta, tensionDelta };

        renderKpis(countries, tension);
        renderTiles(lastSnapshot);

        markers.clearLayers();
        const hotnessValues = countries.map(c => c.avg_hotness);
        const stats = { maxEvents: Math.max(...countries.map(c => c.event_count), 1), minHotness: hotnessValues.length ? Math.min(...hotnessValues) : 0, maxHotness: hotnessValues.length ? Math.max(...hotnessValues) : 100 };
        stats.hotnessSpan = Math.max(1, stats.maxHotness - stats.minHotness);

        countries.forEach(country => {
          const style = markerStyle(country, stats);
          const marker = L.circleMarker([country.lat, country.lon], { radius: style.radius, color: style.borderColor, fillColor: style.fillColor, fillOpacity: 0.7 });
          marker.bindPopup(`<b>${country.country}</b><br/>${t().eventCount}: ${country.event_count}<br/>${t().hotness}: ${country.avg_hotness}<br/>${t().mainType}: ${country.top_topic_label || topicLabel(country.top_topic)}`);
          marker.on('click', () => { selectedCountry = country.country; loadPanel(selectedCountry); });
          marker.addTo(markers);
        });

        await loadPanel(selectedCountry);
      }

      document.getElementById('toggle-theme').addEventListener('click', () => applyTheme(currentTheme === 'dark' ? 'light' : 'dark'));
      document.getElementById('clear-filters').addEventListener('click', async () => { clearSelectedTopics(); activeTopics = []; selectedCountry = null; await bootstrap(); });
      document.getElementById('tiles-toggle').addEventListener('click', () => {
        panelCollapsed = !panelCollapsed;
        syncTilePanelState();
      });

      setupLanguage();
      rerenderStaticText();
      initFilters();
      renderTiles(lastSnapshot);
      bootstrap();
      setInterval(bootstrap, 15 * 60 * 1000);
    </script>
  </body>
</html>
